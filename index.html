<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado ANAC - SELEÇÃO LINHAS</title>
    <style>
        :root {
            --primary: #003366;
            --secondary: #2c3e50;
            --accent: #e67e22;
            --success: #27ae60;
            --danger: #c0392b;
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --border: #dcdde1;
            --text: #2f3640;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text); 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
        }

        .quiz-card { 
            background: var(--bg-card); 
            width: 100%; 
            max-width: 800px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            padding: 30px; 
        }

        /* Gerenciamento de Telas */
        #menu-screen, #quiz-ui, #result-display, #review-screen { display: none; }
        .active { display: block !important; }

        /* Menu Principal */
        .header-main { text-align: center; margin-bottom: 30px; }
        .prova-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
        }
        .btn-prova { 
            background: var(--primary); 
            color: white; 
            padding: 20px; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1.1rem;
            transition: transform 0.2s;
        }
        .btn-prova:hover { transform: translateY(-3px); background: #004080; }

        /* Questões */
        .header-quiz { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--bg-body); padding-bottom: 15px; }
        .question-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; line-height: 1.4; }
        .options-group { display: flex; flex-direction: column; gap: 10px; }
        .option-item { 
            padding: 15px 20px; 
            border: 2px solid var(--border); 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.2s; 
        }
        .option-item:hover { border-color: var(--primary); background: #f0f7ff; }
        .option-item.selected { background-color: var(--primary); color: white; border-color: var(--primary); }

        /* Navegação */
        .nav-footer { display: flex; justify-content: space-between; margin-top: 30px; gap: 10px; }
        button { padding: 12px 25px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-next { background: var(--primary); color: white; flex-grow: 1; }
        .btn-prev { background: #bdc3c7; color: #333; }
        .btn-finish { background: var(--success); color: white; flex-grow: 1; }

        /* Resultados e Revisão */
        .score-box { font-size: 4rem; font-weight: 800; margin: 20px 0; }
        .btn-review-toggle { background: var(--accent); color: white; width: 100%; margin-top: 15px; padding: 15px; }
        
        .review-item { margin-bottom: 20px; padding: 20px; border-radius: 8px; border-left: 6px solid #ccc; text-align: left; }
        .rev-correct { border-left-color: var(--success); background: #eafff2; }
        .rev-wrong { border-left-color: var(--danger); background: #fff2f2; }
        .status-tag { font-weight: bold; font-size: 0.85rem; display: block; margin-bottom: 8px; }
        
    </style>
</head>
<body>

<div class="quiz-card">
    <div id="menu-screen" class="active">
        <div class="header-main">
            <h1>Simulados Seleção Linhas</h1>
            <p>Selecione uma prova para começar os estudos</p>
            
        </div>
        <div class="prova-grid" id="prova-selector"></div>
    </div>

    <div id="quiz-ui">
        <div class="header-quiz">
            <h2 id="prova-title-display">Prova</h2>
            <div id="progress">Questão 1 de 20</div>
        </div>
        <p class="question-text" id="question-text"></p>
        <div class="options-group" id="options-container"></div>
        <div class="nav-footer">
            <button class="btn-prev" onclick="handleNav(-1)">Anterior</button>
            <button class="btn-next" id="next-btn" onclick="handleNav(1)">Próxima</button>
        </div>
    </div>

    <div id="result-display" style="text-align:center">
        <h1>Resultado Final</h1>
        <div class="score-box" id="final-score">0%</div>
        <p id="feedback-text" style="font-size: 1.2rem;"></p>
        <button class="btn-review-toggle" onclick="showReview()">Revisar Questões Marcadas</button>
        <button class="btn-next" style="margin-top:10px; background:#2c3e50; width:100%" onclick="location.reload()">Voltar ao Início</button>
    </div>

    <div id="review-screen">
        <h1 style="margin-bottom:20px; text-align: center;">Revisão Detalhada</h1>
        <div id="review-content"></div>
        <button class="btn-next" style="width:100%; margin-top:20px" onclick="location.reload()">Finalizar Revisão</button>
         
    </div>
   <Br>
    <img src="img/qrcode-pix.png" alt="Descrição da imagem para acessibilidade" width="150" height="150">
    <p>Faça uma doação </p>
</div>

    let currentExam = [];
    let currentIdx = 0;
    let userAnswers = [];

    function initMenu() {
        const selector = document.getElementById('prova-selector');
        selector.innerHTML = '';
        Object.keys(examDatabase).forEach(nome => {
            const btn = document.createElement('button');
            btn.className = 'btn-prova';
            btn.innerText = nome;
            btn.onclick = () => startExam(nome);
            selector.appendChild(btn);
        });
    }

    function startExam(nome) {
        currentExam = examDatabase[nome];
        userAnswers = new Array(currentExam.length).fill(null);
        currentIdx = 0;
        document.getElementById('prova-title-display').innerText = nome;
        switchScreen('quiz-ui');
        render();
    }

    function render() {
        const item = currentExam[currentIdx];
        document.getElementById('question-text').innerText = item.question;
        document.getElementById('progress').innerText = `Questão ${currentIdx + 1} de ${currentExam.length}`;

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        item.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = `option-item ${userAnswers[currentIdx] === i ? 'selected' : ''}`;
            div.innerHTML = `<strong>${String.fromCharCode(65 + i)})</strong> ${opt}`;
            div.onclick = () => { userAnswers[currentIdx] = i; render(); };
            container.appendChild(div);
        });

        const nextBtn = document.getElementById('next-btn');
        if (currentIdx === currentExam.length - 1) {
            nextBtn.innerText = "Finalizar Prova";
            nextBtn.className = "btn-finish";
        } else {
            nextBtn.innerText = "Próxima";
            nextBtn.className = "btn-next";
        }
    }

    function handleNav(dir) {
        if (dir === 1 && userAnswers[currentIdx] === null) {
            alert("Selecione uma alternativa antes de prosseguir.");
            return;
        }
        const next = currentIdx + dir;
        if (next >= 0 && next < currentExam.length) { 
            currentIdx = next; 
            render(); 
        } else if (next === currentExam.length) {
            finishExam();
        }
    }

    function finishExam() {
        let hits = 0;
        userAnswers.forEach((ans, i) => { if (ans === currentExam[i].correct) hits++; });
        const score = Math.round((hits / currentExam.length) * 100);
        
        const scoreDisplay = document.getElementById('final-score');
        scoreDisplay.innerText = `${score}%`;
        scoreDisplay.style.color = score >= 70 ? 'var(--success)' : 'var(--danger)';
        
        document.getElementById('feedback-text').innerText = score >= 70 ? 
            "Parabéns! Você atingiu o critério de aprovação." : 
            "Infelizmente você não atingiu os 70%. Continue revisando.";
            
        switchScreen('result-display');
    }

    function showReview() {
        const container = document.getElementById('review-content');
        container.innerHTML = '';
        currentExam.forEach((q, i) => {
            const isCorrect = userAnswers[i] === q.correct;
            const div = document.createElement('div');
            div.className = `review-item ${isCorrect ? 'rev-correct' : 'rev-wrong'}`;
            
            div.innerHTML = `
                <span class="status-tag" style="color:${isCorrect ? 'var(--success)' : 'var(--danger)'}">
                    ${isCorrect ? '✓ ACERTOU' : '✗ ERROU'}
                </span>
                <p><strong>${q.question}</strong></p>
                <p style="margin-top:10px">Sua resposta: <strong>${String.fromCharCode(65 + userAnswers[i])}) ${q.options[userAnswers[i]]}</strong></p>
                ${!isCorrect ? `<p style="color:var(--success); font-weight:bold; margin-top:5px">Resposta correta: ${String.fromCharCode(65 + q.correct)}) ${q.options[q.correct]}</p>` : ''}
            `;
            container.appendChild(div);
        });
        switchScreen('review-screen');
        window.scrollTo(0,0);
    }

    function switchScreen(id) {
        document.querySelectorAll('.quiz-card > div').forEach(div => div.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    initMenu();
</script>
